name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build release artifacts
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gaz-mcp_${{ github.ref_name }}_*.tar.gz
            dist/gaz-mcp_${{ github.ref_name }}_*.zip
            dist/gaz-mcp_${{ github.ref_name }}_checksums.txt
          generate_release_notes: true
